<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARS · Admin Console</title>
<style>
/* =====================================================================
   INFINITY — Loyalty Infrastructure Admin Console
   Design System foundation. Banking-grade, calm, data-rich.
   ===================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,450;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* ---- Accent (muted indigo / periwinkle) ---- */
  --accent:        #4F5BD5;
  --accent-hover:  #4350C0;
  --accent-press:  #3A46AC;
  --accent-mid:    #6E78E0;
  --accent-tint:   #C7CBF2;
  --accent-soft:   #EEEFFB;
  --accent-soft-2: #E4E6F8;
  --accent-ring:   rgba(79, 91, 213, 0.18);

  /* ---- Neutrals (cool-leaning off-white) ---- */
  --bg:            #FAFAFB;
  --bg-sunken:     #F5F5F7;
  --surface:       #FFFFFF;
  --surface-2:     #FBFBFC;
  --sidebar:       #FBFBFC;
  --hover:         #F4F4F6;

  --border:        #ECECEF;
  --border-2:      #E4E4E8;
  --border-strong: #D8D9DE;

  --text:          #1B1C22;
  --text-2:        #5E616E;
  --text-3:        #8A8D99;
  --text-4:        #ADB0BB;
  --on-accent:     #FFFFFF;

  /* ---- Status (all muted, financial) ---- */
  --green:      #137A4F;  --green-bg:  #E6F2EC;  --green-bd:  #C6E4D5;
  --amber:      #936400;  --amber-bg:  #FAF1DC;  --amber-bd:  #EFDFB6;
  --blue:       #2F62D6;  --blue-bg:   #E9EFFC;  --blue-bd:   #CFDDF7;
  --slate:      #5C6373;  --slate-bg:  #EFF0F3;  --slate-bd:  #E0E2E8;
  --violet:     #6B59C9;  --violet-bg: #EEEBFA;  --violet-bd: #DAD3F2;
  --red:        #BB453C;  --red-bg:    #FAEBE9;  --red-bd:    #F0D2CE;

  /* ---- Radius ---- */
  --r-xs: 6px;
  --r-sm: 8px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
  --r-pill: 999px;

  /* ---- Shadow ---- */
  --sh-xs:  none;
  --sh-sm:  none;
  --sh-card:none;
  --sh-md:  none;
  --sh-pop: none;

  /* ---- Type ---- */
  --font: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  --sidebar-w: 248px;
  --header-h: 64px;
}

* { box-sizing: border-box; }

html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

body {
  margin: 0;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  font-weight: 450;
  letter-spacing: -0.005em;
}

::selection { background: var(--accent-soft-2); }

h1,h2,h3,h4,p { margin: 0; }
button { font-family: inherit; }
.tnum { font-variant-numeric: tabular-nums; }
.mono { font-family: var(--mono); }

/* ============================ TYPOGRAPHY ============================ */
.eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--text-3);
}
.display { font-size: 34px; font-weight: 600; letter-spacing: -.022em; line-height: 1.05; }
.h1 { font-size: 27px; font-weight: 600; letter-spacing: -.02em; line-height: 1.15; }
.h2 { font-size: 19px; font-weight: 600; letter-spacing: -.014em; }
.h3 { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
.body { font-size: 14px; color: var(--text); }
.muted { color: var(--text-2); }
.muted-2 { color: var(--text-3); }
.small { font-size: 13px; }
.xsmall { font-size: 12px; }

/* ============================ APP SHELL ============================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar {
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sb-brand {
  height: var(--header-h);
  display: flex; align-items: center; gap: 9px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
.brand-mark {
  font-weight: 800; letter-spacing: -.03em; font-size: 19px; color: var(--text);
}
.brand-mark b { color: var(--accent); font-weight: 800; }
.sb-org {
  margin: 12px 12px 4px;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r-md);
  border: 1px solid var(--border-2); background: var(--surface);
  cursor: pointer; transition: background .15s, border-color .15s;
}
.sb-org:hover { background: var(--hover); border-color: var(--border-strong); }
.org-avatar {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  background: linear-gradient(140deg, var(--accent), var(--accent-mid));
  color: #fff; display: grid; place-items: center;
  font-size: 12px; font-weight: 700; flex: none;
}
.org-meta { line-height: 1.25; min-width: 0; }
.org-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.org-sub { font-size: 11px; color: var(--text-3); }
.sb-org .chev { margin-left: auto; color: var(--text-3); flex: none; }

.sb-nav { padding: 8px 12px; overflow-y: auto; flex: 1; }
.nav-group-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  color: var(--text-4); padding: 14px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px; border-radius: var(--r-sm);
  color: var(--text-2); font-size: 13.5px; font-weight: 500;
  cursor: pointer; text-decoration: none; position: relative;
  transition: background .14s, color .14s;
}
.nav-item svg { width: 18px; height: 18px; flex: none; stroke-width: 1.6; color: var(--text-3); transition: color .14s; }
.nav-item:hover { background: var(--hover); color: var(--text); }
.nav-item:hover svg { color: var(--text-2); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
.nav-item.active svg { color: var(--accent); }
.nav-item .badge-count {
  margin-left: auto; font-size: 11px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border-2);
  color: var(--text-2); border-radius: var(--r-pill); padding: 0 7px; line-height: 18px;
}
.nav-item.active .badge-count { background: #fff; border-color: var(--accent-tint); color: var(--accent); }

.sb-foot {
  border-top: 1px solid var(--border); padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 30px; height: 30px; border-radius: var(--r-sm); flex: none;
  background: #E9E4DC; color: #6c5c44; display: grid; place-items: center;
  font-size: 12px; font-weight: 700;
}
.user-meta { line-height: 1.3; min-width: 0; flex: 1; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-sub { font-size: 11px; color: var(--text-3); white-space: nowrap; }

/* ---- Main + header ---- */
.main { display: flex; flex-direction: column; min-width: 0; }
.header {
  height: var(--header-h); flex: none;
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px; border-bottom: 1px solid var(--border);
  background: rgba(250,250,251,.82); backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 30;
}
.search {
  flex: 1; max-width: 540px;
  display: flex; align-items: center; gap: 10px;
  height: 38px; padding: 0 12px;
  background: var(--surface); border: 1px solid var(--border-2);
  border-radius: var(--r-md); color: var(--text-3); cursor: text;
  transition: border-color .15s, box-shadow .15s;
}
.search:focus-within { border-color: var(--accent-tint); box-shadow: 0 0 0 3px var(--accent-ring); }
.search svg { width: 16px; height: 16px; flex: none; }
.search input {
  border: none; outline: none; background: none; flex: 1;
  font-family: inherit; font-size: 13.5px; color: var(--text);
}
.search input::placeholder { color: var(--text-3); }
.kbd {
  font-family: var(--mono); font-size: 11px; color: var(--text-3);
  border: 1px solid var(--border-2); border-radius: 5px;
  padding: 1px 6px; background: var(--surface-2);
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.demo-pill {
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; flex: none;
  font-size: 12px; font-weight: 600; color: var(--amber);
  background: var(--amber-bg); border: 1px solid var(--amber-bd);
  border-radius: var(--r-pill); padding: 5px 11px 5px 9px;
}
.demo-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); }
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--r-md);
  border: 1px solid var(--border-2); background: var(--surface);
  display: grid; place-items: center; cursor: pointer; color: var(--text-2);
  position: relative; transition: background .15s, border-color .15s, color .15s;
}
.icon-btn:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
.icon-btn svg { width: 18px; height: 18px; stroke-width: 1.6; }
.icon-btn .ind {
  position: absolute; top: 7px; right: 8px; width: 7px; height: 7px;
  background: var(--red); border: 1.5px solid var(--surface); border-radius: 50%;
}

/* ---- Content area ---- */
.content { padding: 28px; max-width: 1240px; width: 100%; }
.content.wide { max-width: none; }
.page-head { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 22px; }
.page-head .grow { flex: 1; }
.page-sub { color: var(--text-2); margin-top: 6px; font-size: 14px; }

/* ============================ BUTTONS ============================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 38px; padding: 0 16px; border-radius: var(--r-md);
  font-family: inherit; font-size: 13.5px; font-weight: 600; letter-spacing: -.005em;
  cursor: pointer; border: 1px solid transparent; white-space: nowrap;
  transition: background .15s, border-color .15s, box-shadow .15s, color .15s, transform .04s;
}
.btn:active { transform: translateY(.5px); }
.btn svg { width: 16px; height: 16px; stroke-width: 1.8; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: var(--sh-xs); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { background: var(--accent-press); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border-strong); box-shadow: var(--sh-xs); }
.btn-secondary:hover { background: var(--hover); }
.btn-ghost { background: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--hover); color: var(--text); }
.btn-soft { background: var(--accent-soft); color: var(--accent); }
.btn-soft:hover { background: var(--accent-soft-2); }
.btn-danger-ghost { background: var(--red-bg); color: var(--red); }
.btn-sm { height: 32px; padding: 0 12px; font-size: 13px; border-radius: var(--r-sm); }
.btn-lg { height: 44px; padding: 0 22px; font-size: 14.5px; }
.btn:disabled { opacity: .5; pointer-events: none; }
.btn-block { width: 100%; }

/* ============================ CARDS ============================ */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); box-shadow: var(--sh-card);
}
.card-pad { padding: 20px; }
.card-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.card-head .grow { flex: 1; }
.card-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
.card-foot {
  padding: 13px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.grid { display: grid; gap: 18px; }
.grid > * { min-width: 0; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* ---- KPI card ---- */
.kpi { padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; }
.kpi-top { display: flex; align-items: center; justify-content: space-between; }
.kpi-label { font-size: 12.5px; font-weight: 600; color: var(--text-2); }
.kpi-ic {
  width: 30px; height: 30px; border-radius: var(--r-sm); flex: none;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center;
}
.kpi-ic svg { width: 16px; height: 16px; stroke-width: 1.7; }
.kpi-val { font-size: 28px; font-weight: 600; letter-spacing: -.02em; line-height: 1; }
.kpi-val .unit { font-size: 16px; font-weight: 600; color: var(--text-3); margin-left: 1px; }
.kpi-delta { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 600; }
.kpi-delta.up { color: var(--green); }
.kpi-delta.down { color: var(--red); }
.kpi-delta .vs { color: var(--text-3); font-weight: 500; }

/* ============================ BADGES & PILLS ============================ */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; line-height: 1;
  padding: 5px 9px; border-radius: var(--r-pill); border: 1px solid transparent;
  white-space: nowrap;
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
.badge.green  { color: var(--green);  background: var(--green-bg);  border-color: var(--green-bd); }
.badge.green .dot  { background: var(--green); }
.badge.amber  { color: var(--amber);  background: var(--amber-bg);  border-color: var(--amber-bd); }
.badge.amber .dot  { background: var(--amber); }
.badge.blue   { color: var(--blue);   background: var(--blue-bg);   border-color: var(--blue-bd); }
.badge.blue .dot   { background: var(--blue); }
.badge.slate  { color: var(--slate);  background: var(--slate-bg);  border-color: var(--slate-bd); }
.badge.slate .dot  { background: var(--slate); }
.badge.violet { color: var(--violet); background: var(--violet-bg); border-color: var(--violet-bd); }
.badge.violet .dot { background: var(--violet); }
.badge.pending { color: #4451BF; background: #EAECFA; border-color: #C5CBF0; }
.badge.pending .dot { background: #4451BF; }
.badge.red    { color: var(--red);    background: var(--red-bg);    border-color: var(--red-bd); }
.badge.red .dot    { background: var(--red); }

.tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: var(--text-2);
  background: var(--bg-sunken); border: 1px solid var(--border-2);
  border-radius: var(--r-sm); padding: 3px 8px;
}

/* ============================ TABLE ============================ */
.table-wrap { overflow: hidden; }
table.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  text-align: left; font-size: 11.5px; font-weight: 600; letter-spacing: .03em;
  text-transform: uppercase; color: var(--text-3);
  padding: 11px 20px; border-bottom: 1px solid var(--border); background: var(--surface-2);
}
.tbl tbody td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 13.5px; vertical-align: middle; }
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl tbody tr { transition: background .12s; }
.tbl tbody tr:hover { background: var(--surface-2); }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl th.num { text-align: right; }
.cell-strong { font-weight: 600; color: var(--text); }
.cell-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.row-ic {
  width: 30px; height: 30px; border-radius: var(--r-sm); flex: none;
  background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 12px;
}
.cell-flex { display: flex; align-items: center; gap: 11px; }

/* ============================ FORMS ============================ */
.field { display: flex; flex-direction: column; gap: 7px; }
.label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.label .opt { color: var(--text-3); font-weight: 500; }
.hint { font-size: 12px; color: var(--text-3); }
.input, .select, .textarea {
  width: 100%; height: 40px; padding: 0 12px;
  border: 1px solid var(--border-strong); border-radius: var(--r-md);
  background: var(--surface); font-family: inherit; font-size: 13.5px; color: var(--text);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.textarea { height: auto; padding: 10px 12px; resize: vertical; line-height: 1.5; }
.input::placeholder, .textarea::placeholder { color: var(--text-3); }
.input:focus, .select:focus, .textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
.input:disabled { background: var(--bg-sunken); color: var(--text-3); }
.select {
  appearance: none; cursor: pointer;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238A8D99' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat; background-position: right 11px center; padding-right: 36px;
}
.input-group { position: relative; display: flex; align-items: center; }
.input-prefix, .input-suffix {
  position: absolute; font-size: 13.5px; color: var(--text-3); font-weight: 500; pointer-events: none;
}
.input-prefix { left: 12px; }
.input-suffix { right: 12px; }
.input-group .input.has-prefix { padding-left: 28px; }
.input-group .input.has-suffix { padding-right: 52px; }
.input-icon { position: absolute; left: 12px; color: var(--text-3); display: grid; place-items: center; }
.input-icon svg { width: 16px; height: 16px; }
.input-group .input.has-icon { padding-left: 36px; }

/* Toggle */
.toggle { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
.toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
.toggle .track {
  width: 40px; height: 23px; border-radius: var(--r-pill);
  background: var(--border-strong); transition: background .18s; position: relative;
}
.toggle .thumb {
  position: absolute; top: 2.5px; left: 2.5px; width: 18px; height: 18px; border-radius: 50%;
  background: #fff; transition: transform .18s;
}
.toggle input:checked + .track { background: var(--accent); }
.toggle input:checked + .track .thumb { transform: translateX(17px); }
.toggle input:focus-visible + .track { box-shadow: 0 0 0 3px var(--accent-ring); }

/* Segmented control */
.segmented { display: inline-flex; background: var(--bg-sunken); border: 1px solid var(--border-2); border-radius: var(--r-md); padding: 3px; gap: 2px; }
.segmented button {
  border: none; background: none; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 600; color: var(--text-2);
  padding: 6px 14px; border-radius: 7px; transition: background .14s, color .14s;
}
.segmented button.on { background: var(--surface); color: var(--text); box-shadow: var(--sh-xs); }

/* Checkbox */
.check { display: inline-flex; align-items: center; gap: 9px; cursor: pointer; font-size: 13.5px; }
.check input { position: absolute; opacity: 0; }
.check .box {
  width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border-strong);
  display: grid; place-items: center; transition: background .14s, border-color .14s; flex: none;
}
.check .box svg { width: 12px; height: 12px; color: #fff; opacity: 0; stroke-width: 3; }
.check input:checked + .box { background: var(--accent); border-color: var(--accent); }
.check input:checked + .box svg { opacity: 1; }

/* ============================ STEPPER ============================ */
.stepper { display: flex; align-items: center; gap: 0; }
.step { display: flex; align-items: center; gap: 11px; }
.step-dot {
  width: 28px; height: 28px; border-radius: 50%; flex: none;
  display: grid; place-items: center; font-size: 12.5px; font-weight: 700;
  background: var(--surface); border: 1.5px solid var(--border-strong); color: var(--text-3);
  transition: all .18s;
}
.step.done .step-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
.step.active .step-dot { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.step-label { font-size: 13px; font-weight: 600; color: var(--text-3); white-space: nowrap; }
.step.active .step-label { color: var(--text); }
.step.done .step-label { color: var(--text-2); }
.step-line { flex: 1; height: 1.5px; background: var(--border-2); margin: 0 14px; min-width: 28px; }
.step.done + .step-line, .step-line.done { background: var(--accent-tint); }

/* ============================ RULES FLOW ============================ */
.rule-group { display: flex; flex-direction: column; }
.rule-source {
  border: 1px solid var(--border-2); border-radius: var(--r-md); background: var(--surface-2);
  padding: 14px 16px;
}
.rule-source .rs-name { font-size: 14px; font-weight: 700; }
.rule-source .rs-bal { font-size: 13px; color: var(--text-3); margin-top: 2px; font-variant-numeric: tabular-nums; }
.rule-branch { display: flex; }
.rule-rail { width: 40px; position: relative; flex: none; }
.rule-rail::before {
  content: ''; position: absolute; left: 19px; top: -2px; bottom: 50%;

        {orgOpen &&
          <div className="pop" style={{ left: 12, right: 12, top: 56 }}>
            <div className="pop-item on"><div className="org-avatar" style={{ width: 22, height: 22 }}>N</div>MTB Neo · STARS Loyalty{Ic('check', { size: 14 })}</div>
            <div className="pop-item"><div className="org-avatar" style={{ width: 22, height: 22, background: 'var(--slate)' }}>S</div>Sandbox</div>
            <div className="pop-sep"></div>
            <div className="pop-item muted">{Ic('plus', { size: 14 })}New workspace</div>
          </div>
          }
      </div>
      <nav className="sb-nav">
        {NAV.map((g) =>
          <div key={g.group}>
            <div className="nav-group-label">{g.group}</div>
            {g.items.map((it) =>
            <a key={it.id} className={'nav-item' + (active === it.id ? ' active' : '')} onClick={() => setActive(it.id)}>
                {Ic(it.icon, { size: 18 })}{it.id}
                {it.count && <span className="badge-count">{it.count}</span>}
              </a>
            )}
          </div>
          )}
      </nav>
      <div className="sb-foot">
        <div className="user-avatar">KJ</div>
        <div className="user-meta"><div className="user-name">Kaiser Jahangir</div><div className="user-sub">Program Admin</div></div>
        {Ic('chevUp', { size: 14, style: { color: 'var(--text-3)' } })}
      </div>
    </aside>);

  }

  // ── Header ───────────────────────────────────────────────────
  function Header({ onCreate, notifs, setNotifs, notifOpen, setNotifOpen }) {
    const unread = notifs.filter((n) => !n.read).length;
    return (
      <header className="header" style={{ position: 'relative' }}>
      <div className="search">
        {Ic('search', { size: 16, sw: 1.8 })}
        <input placeholder="Search campaigns, segments, rewards…" />
        <span className="kbd">⌘K</span>
      </div>
      <div className="header-right">
        <span className="demo-pill"><span className="dot"></span>Demo</span>
        <div style={{ position: 'relative' }}>
          <button className="icon-btn" onClick={() => setNotifOpen((o) => !o)}>
            {unread > 0 && <span className="ind"></span>}
            {Ic('bell', { size: 18 })}
          </button>
          {notifOpen && <NotifPanel notifs={notifs} setNotifs={setNotifs} onClose={() => setNotifOpen(false)} />}
        </div>
        <button className="btn btn-primary" onClick={onCreate}>{Ic('plus', { size: 16 })}Create Campaign</button>
      </div>
    </header>);

  }

  // ── App ──────────────────────────────────────────────────────
  function App() {
    const [loggedIn, setLoggedIn] = useState(() => localStorage.getItem('demo_loggedIn') === 'true');
    const [active, setActive] = useState('Dashboard');
    const [campaigns, setCampaigns] = useState(window.DATA.campaigns);
    const [budget, setBudget] = useState(null);
    const [notifs, setNotifs] = useState([]);
    const [notifOpen, setNotifOpen] = useState(false);
    const [campaignDetail, setCampaignDetail] = useState(null);

    // Cross-tab sync (Demo Simulator → Console)
    useEffect(() => {
      const handler = (e) => {
        if (e.key === 'demo_reset') {
          setCampaigns(window.DATA.campaigns);
          setNotifs([]);
          setNotifOpen(false);
          setCampaignDetail(null);
          setBudget(null);
          setActive('Dashboard');
          localStorage.removeItem('demo_pfmstreak_status');
        }
        if (e.key === 'demo_loggedIn' && e.newValue === null) setLoggedIn(false);
      };
      window.addEventListener('storage', handler);
      return () => window.removeEventListener('storage', handler);
    }, []);

    // ── Login gate ──
    if (!loggedIn) {
      return <LoginScreen onLogin={() => {
        localStorage.setItem('demo_loggedIn', 'true');
        setLoggedIn(true);
      }} />;
    }

    const openCreate = () => setActive('Campaign Builder');

    // ── Campaign publish with approval simulation ──
    const publish = (f) => {
      const mark = (f.name || 'C').trim()[0].toUpperCase();
      const isBonus = f.name && f.name.toLowerCase().replace(/\s+/g, '').includes('billpaybonus');
      const newId = 'CMP_D' + Date.now().toString().slice(-5);
      const camp = {
        id: newId, mark, name: f.name || 'New Campaign',
        status: 'Pending Approval',
        trigger: isBonus ? 'Pay one utility bill' : f.triggerEvent || '—',
        audience: isBonus ? 'All MTB app users' : f.segment === 'all' ? 'All active MTB Neo users' : f.segment === 'tier' ? 'Tier · Gold+ members' : 'Segment · Salaried',
        issued: '0', liability: '৳0',
        ends: f.endDate || (isBonus ? 'Jun 30' : 'Open'),
        isDemo: isBonus
      };

      setCampaigns((cs) => [camp, ...cs]);
      // Don't navigate — let builder's own Back button handle it so the confirmation screen stays visible

      // Pending notification (silent — just the dot)
      addNotif({ msg: `"${camp.name}" submitted for approval. Awaiting Marketing Lead and Risk sign-off.`, tone: 'pending' });
      setNotifOpen(true);

      if (isBonus) {
        localStorage.setItem('demo_billbonus_status', 'pending');

        setTimeout(() => {
          setCampaigns((cs) => cs.map((c) => c.id === newId ? { ...c, status: 'Approved' } : c));
          addNotif({ msg: '"Bill Pay Bonus" approved by the review team. Activating…', tone: 'info' });
          setTimeout(() => {
            setCampaigns((cs) => cs.map((c) => c.id === newId ? { ...c, status: 'Live', live: true } : c));
            localStorage.setItem('demo_billbonus_status', 'live');
            addNotif({ msg: '"Bill Pay Bonus" is now live on MTB Neo.', tone: 'success' });
            setNotifOpen(true);
          }, 2500);
        }, 2500);
      }
    };

    // ── Campaign row click: detail for demo, budget modal for others ──
    const handleSelect = (c) => c.isDemo ? setCampaignDetail(c) : setBudget(c);

    const addNotif = (n) => setNotifs(ns => [...ns, { id: Date.now() + Math.random(), time: 'Just now', read: false, ...n }]);
    const np = { notifs, setNotifs, notifOpen, setNotifOpen };

    let page;
    if (active === 'Dashboard') page = <window.Dashboard campaigns={campaigns} onOpenBudget={handleSelect} onCreate={openCreate} />;else
    if (active === 'Campaigns') page = <window.CampaignsPage campaigns={campaigns} onOpenBudget={handleSelect} onCreate={openCreate} />;else
    if (active === 'Campaign Builder') page = <window.BuilderPage onBack={() => setActive('Campaigns')} onPublish={publish} />;else
    if (active === 'Rules Engine') page = <window.RulesEnginePage onCreate={openCreate} />;else
    if (active === 'STARS Intelligence') page = <window.StarsIntelligencePage onCreate={openCreate} />;
    else if (active === 'Personalization Engine') page = <window.PersonalizationPage onCreate={openCreate} />;
    else if (active === 'Tier Management') page = <window.TierManagementPage onCreate={openCreate} />;else
    if (active === 'Integrations') page = <window.IntegrationsPage onCreate={openCreate} />;else
    if (active === 'Rewards Catalogue') page = <window.RewardsCataloguePage onCreate={openCreate} />;else
    if (active === 'Customer Segments') page = <window.CustomerSegmentsPage onCreate={openCreate} />;else
    if (active === 'Gamification') page = <window.GamificationPage onCreate={openCreate} addNotif={addNotif} setNotifOpen={setNotifOpen} />;
    else if (active === 'Analytics & Liability') page = <window.AnalyticsPage campaigns={campaigns} onOpenBudget={handleSelect} onCreate={openCreate} />;

    const isBuildPage = active === 'Campaign Builder';

    return (
      <div className="app">
      <Sidebar active={active} setActive={setActive} />
      <div className="main">
        {!isBuildPage && <Header onCreate={openCreate} {...np} />}
        {isBuildPage &&
          <header className="header" style={{ position: 'relative' }}>
            <div className="search">
              {Ic('search', { size: 16, sw: 1.8 })}
              <input placeholder="Search campaigns, segments, rewards…" />
              <span className="kbd">⌘K</span>
            </div>
            <div className="header-right">
              <span className="demo-pill"><span className="dot"></span>Demo Mode</span>
              <div style={{ position: 'relative' }}>
                <button className="icon-btn" onClick={() => setNotifOpen((o) => !o)}>
                  {notifs.filter((n) => !n.read).length > 0 && <span className="ind"></span>}
                  {Ic('bell', { size: 18 })}
                </button>
                {notifOpen && <NotifPanel notifs={notifs} setNotifs={setNotifs} onClose={() => setNotifOpen(false)} />}
              </div>
            </div>
          </header>
          }
        {page}
      </div>
      {budget && <window.BudgetModal campaign={budget} onClose={() => setBudget(null)} />}
      {campaignDetail && <BillPayBonusModal campaign={campaignDetail} onClose={() => setCampaignDetail(null)} />}
    </div>);

  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
